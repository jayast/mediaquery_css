<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
</head>
<style>
    * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #f5f5f5;
        padding: 40px;
    }

    .container {
        max-width: 1200px;
        margin: auto;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
    }

    .type {
        color: #777;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 30px;
        margin-top: 15px;
    }

    .rating {
        color: #666;
        margin-bottom: 20px;
    }

    .rating span {
        color: #ff1493;
        font-weight: bold;
    }

    .location {
        color: #ff1493;
    }

    .description .p {
        color: #666;
        line-height: 1.7;
        margin-bottom: 25px;
    }

    .more {
        display: inline;
        margin-bottom: 35px;
        color: #ff1493;
        text-decoration: none;
        font-weight: bold;
    }

    button {
        display: block;
        margin-top: 70px;
        padding: 15px 25px;
        border: none;
        background: #ff1493;
        color: #fff;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }

    .gallery .big {
        grid-column: 1/3;
        height: 170px;
    }

    .gallery img {
        width: 100%;
        height: 170px;
        object-fit: cover;
        border-radius: 8px;
        margin-top: 3px;
    }


    @media(max-width:992px) {
        .container {
            display: flex;
            flex-direction: column;
        }

        .gallery {
            order: 1;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
        }

        .gallery .big {
            grid-column: auto;
            height: 170px;
        }

        .content {
            order: 2;
        }

        button {
            float: right;
            margin-top: -140px;
        }
    }

    @media(max-width:768px) {
        .container {
            display: flex;
            flex-direction: column;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .gallery .big {
            grid-column: 1/2;
            height: 220px;
        }

        .gallery .medium{
            display: none;
        }
        .gallery img {
            height: 220px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .description {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        button {
            float: right;
            width: 200px;
        }
    }

    @media(max-width:480px) {
        .container {
            padding: 10px;
        }

        .gallery {
            display: block;
        }

        .gallery img:not(.big) {
            display: none;
        }

        .gallery .big {
            width: 100%;
            height: 200px;
        }

        .content {
            margin-top: 10px;
        }

        .type{
            position: absolute;
            top: 170px;
            left: 60px;
            color: rgb(218, 209, 209);
            font-weight: bold;
        }
        h1 {
            position: absolute;
            top: 190px;
            left: 60px;
            color: white;
            font-size: 20px;
        }

        button {
            width: 100%;
            margin: 20px 0;
        }

        .description {
            font-size: 18px;
        }
    }
</style>

<body>
    <div class="container">
        <div class="content">
            <p class="type">Entire house</p>
            <h1>Beach House On Lake Huron</h1>
            <p class="rating">
                ⭐<span> 2.66 </span> (128 reveiws).
                <span class="location"> Boyfeild, ON</span>
            </p>
            <P class="Description">
                This sunny and spacious room is for those travelling light and looking for a comfy
                and cozy place to lay their head for a night... <br>
                <a href="#" class="more">Show more</a> <br>
                <button>Check availability</button>
            </P>
        </div>
        <div class="gallery">
            <img src="/img/m1.png" class="big" alt="media img 1">
            <img src="/img/m2.png" class="small" alt="media img 2">
            <img src="/img/m3.png" class="medium" alt="media img 3">
        </div>
    </div>
</body>

</html>
